name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install & build motion bundle
        run: npm ci && npm run build:motion

      - name: Generate static HTML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          python3 generate.py

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp *.html robots.txt sitemap.xml llms.txt BingSiteAuth.xml _site/
          cp -R assets _site/assets
          cp public/_redirects public/_headers _site/

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages project list 2>/dev/null | grep -q 'qefro-landing-website' \
            || npx --yes wrangler@3 pages project create qefro-landing-website --production-branch=main

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: qefro-landing-website
          directory: _site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
