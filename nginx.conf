# Google Search-friendly static hosting
# https://developers.google.com/search/docs (crawling, indexing, page experience)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Behind TLS-terminating proxy: emit relative Location headers so
    # browsers/crawlers stay on https://qefro.com (not http://).
    absolute_redirect off;
    port_in_redirect off;

    # Compression helps Core Web Vitals (LCP / overall weight)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Prefer HTTPS-facing deployments to set Strict-Transport-Security at the edge.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Cache hashed/static assets; do not block them in robots.txt.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /llms.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Canonicalization: /page.html → /page (301 consolidates signals)
    # https://developers.google.com/search/docs/crawling-indexing/consolidate-duplicate-urls
    location = /index.html {
        return 301 /;
    }

    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    # Canonicalization: /page/ → /page (except site root and /assets/)
    location ~ ^/(?!assets/)(.+)/$ {
        return 301 /$1;
    }

    # Soft-404 fix: missing URLs must return HTTP 404, not 200 + error HTML
    # https://developers.google.com/search/docs/crawling-indexing/http-network-errors
    # Exact / must serve index.html (try_files alone does not apply the index directive).
    location = / {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files /index.html =404;
    }

    location / {
        # Short HTML cache so content updates reach crawlers and users quickly
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri.html =404;
    }

    error_page 404 /404.html;

    # Serve custom 404 body while keeping the 404 status code
    location = /404.html {
        internal;
        add_header Cache-Control "no-store";
    }
}
