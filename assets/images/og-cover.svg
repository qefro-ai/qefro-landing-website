<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Qefro — AI Workspace Platform for Organizations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7c3aed" flood-opacity="0.14"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="180" fill="#7c3aed" opacity="0.08"/>
  <circle cx="150" cy="520" r="150" fill="#a855f7" opacity="0.07"/>
  <circle cx="980" cy="500" r="120" fill="#ec4899" opacity="0.06"/>

  <!-- Brand -->
  <rect x="72" y="72" width="56" height="56" rx="14" fill="#7c3aed"/>
  <text x="100" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Q</text>
  <text x="144" y="110" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111827">Qefro</text>

  <!-- Badge -->
  <rect x="72" y="156" width="320" height="34" rx="17" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="92" y="178" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2" fill="#6d28d9">AI WORKSPACE PLATFORM</text>

  <!-- Headline -->
  <text x="72" y="250" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#111827">Your Company&apos;s</text>
  <text x="72" y="318" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="url(#headline)">AI Workspace</text>

  <!-- Subhead -->
  <text x="72" y="372" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#6b7280">One platform for Customer AI, Employee AI,</text>
  <text x="72" y="404" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#6b7280">and Admin Console — knowledge, tools, and permissions.</text>

  <!-- CTA pill -->
  <rect x="72" y="440" width="320" height="52" rx="12" fill="url(#cta)" filter="url(#shadow)"/>
  <text x="232" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Start Free — No Card Required</text>

  <!-- Trust chips -->
  <text x="72" y="540" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#9ca3af">✓ Free plan available   ✓ Setup in minutes   ✓ Enterprise-ready</text>

  <!-- Platform diagram card -->
  <g transform="translate(700 110)" filter="url(#cardShadow)">
    <rect width="420" height="430" rx="24" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="120" y="36" width="180" height="56" rx="14" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="210" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#111827">Qefro</text>
    <text x="210" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af">Shared AI Platform</text>

    <rect x="24" y="120" width="112" height="72" rx="14" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="80" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#111827">Website</text>
    <text x="80" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">Customer AI</text>

    <rect x="154" y="120" width="112" height="72" rx="14" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
    <text x="210" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#111827">Portal</text>
    <text x="210" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">Employee AI</text>

    <rect x="284" y="120" width="112" height="72" rx="14" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="340" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#111827">WhatsApp</text>
    <text x="340" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">Customer AI</text>

    <rect x="24" y="220" width="372" height="170" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="44" y="252" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Foundation</text>
    <text x="44" y="282" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">Knowledge  ·  Business Tools</text>
    <text x="44" y="310" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">RBAC  ·  Conversations</text>
    <text x="44" y="338" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">Voice  ·  Analytics</text>
    <text x="44" y="368" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9ca3af">Configure once. Deploy everywhere.</text>
  </g>

  <text x="72" y="598" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#7c3aed">qefro.com</text>
</svg>
