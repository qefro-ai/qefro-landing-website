<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Qefro — Turn business knowledge into instant answers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7c3aed" flood-opacity="0.14"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="180" fill="#7c3aed" opacity="0.08"/>
  <circle cx="150" cy="520" r="150" fill="#a855f7" opacity="0.07"/>
  <circle cx="980" cy="500" r="120" fill="#ec4899" opacity="0.06"/>

  <!-- Brand -->
  <rect x="72" y="72" width="56" height="56" rx="14" fill="#7c3aed"/>
  <text x="100" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Q</text>
  <text x="144" y="110" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111827">Qefro</text>

  <!-- Badge -->
  <rect x="72" y="156" width="430" height="34" rx="17" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="92" y="178" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2" fill="#6d28d9">POWERED BY RETRIEVAL-AUGMENTED GENERATION</text>

  <!-- Headline -->
  <text x="72" y="250" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" fill="#111827">Turn Your Business Knowledge</text>
  <text x="72" y="318" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" fill="url(#headline)">Into Instant Answers</text>

  <!-- Subhead -->
  <text x="72" y="372" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6b7280">Grounded in your content — for employees, customers,</text>
  <text x="72" y="404" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6b7280">and internal teams. Says &quot;I don&apos;t know&quot; instead of guessing.</text>

  <!-- CTA pill -->
  <rect x="72" y="440" width="320" height="52" rx="12" fill="url(#cta)" filter="url(#shadow)"/>
  <text x="232" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Start Free — No Card Required</text>

  <!-- Trust chips -->
  <text x="72" y="540" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#9ca3af">✓ Free plan available   ✓ Setup in 5 minutes   ✓ SOC 2 ready</text>

  <!-- Product preview card -->
  <g transform="translate(700 110)" filter="url(#cardShadow)">
    <rect width="420" height="430" rx="24" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="24" y="24" width="372" height="56" rx="14" fill="#f5f3ff"/>
    <circle cx="52" cy="52" r="16" fill="#7c3aed" opacity="0.15"/>
    <text x="52" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#7c3aed">Q</text>
    <text x="80" y="48" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#111827">Qefro Assistant</text>
    <text x="80" y="68" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9ca3af">Powered by your knowledge base</text>

    <rect x="24" y="104" width="260" height="72" rx="16" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="40" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Hi! Ask me about pricing, security,</text>
    <text x="40" y="154" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">or how integration works.</text>

    <rect x="196" y="196" width="200" height="44" rx="22" fill="#f3f4f6"/>
    <text x="296" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">What is Qefro pricing?</text>

    <rect x="24" y="260" width="300" height="88" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="40" y="288" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Free plan available, Starter from $29/mo,</text>
    <text x="40" y="310" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Growth from $99/mo. No credit card needed.</text>
    <text x="40" y="332" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7c3aed">Source: pricing documentation</text>

    <rect x="24" y="372" width="372" height="44" rx="22" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="44" y="400" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#9ca3af">Type your question…</text>
    <circle cx="372" cy="394" r="16" fill="#7c3aed"/>
    <text x="372" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">→</text>
  </g>

  <text x="72" y="598" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#7c3aed">qefro.com</text>
</svg>
